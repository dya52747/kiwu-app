// STORAGE – Hybrid: window.storage + localStorage
// ═══════════════════════════════════════════
async function storeGet(k){
  const key='kiwu_'+k;
  // Try window.storage (Claude artifact – cross-session & cross-device)
  if(typeof window.storage!=='undefined'){
    try{
      const r=await window.storage.get(key);
      return r?JSON.parse(r.value):null;
    }catch{}
  }
  // Fallback: localStorage (GitHub Pages – same device)
  try{return JSON.parse(localStorage.getItem(key))}catch{return null}
}

async function storeSet(k,v){
  const key='kiwu_'+k;
  const str=JSON.stringify(v);
  if(typeof window.storage!=='undefined'){
    try{await window.storage.set(key,str)}catch{}
  }
  try{localStorage.setItem(key,str)}catch{}
}

function storageType(){
  return typeof window.storage!=='undefined'?'☁️ Cloud-Sync aktiv':'💾 Lokaler Speicher';
}

async function loadState(){
  try{
    const [cd1,sc,ml,tr,cf,stim,ls]=await Promise.all([
      storeGet('cd1'),storeGet('sc'),storeGet('ml'),storeGet('tr'),storeGet('cf'),storeGet('stim'),storeGet('ls')
    ]);
    state.cycleDay1=cd1?new Date(cd1):null;
    state.superChecks=sc||{};
    state.madyLog=ml||{};
    state.tracker=tr||{};
    state.customFoods=cf||[];
    if(stim)state.stim={...state.stim,...stim};
    state.lastSaved=ls||null;
    state.syncStatus='ok';
  }catch(e){
    state.syncStatus='error';
  }
}

async function saveKey(k,v){
  try{
    await storeSet(k,v);
    state.lastSaved=new Date().toISOString();
    await storeSet('ls',state.lastSaved);
    state.syncStatus='ok';
  }catch{
    state.syncStatus='error';
  }
}

function today(){return new Date()}
function todayKey(){const d=today();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function cycleDay(){if(!state.cycleDay1)return null;return Math.max(1,Math.floor((today()-state.cycleDay1)/86400000)+1)}
function dow(){return["So","Mo","Di","Mi","Do","Fr","Sa"][today().getDay()]}
function todayMeals(){return MEALS[dow()]||MEALS["Mo"]}
function formatDate(d){return d.toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}
function stimDay(){if(!state.stim.active||!state.stim.startDate)return 0;return Math.max(1,Math.floor((today()-new Date(state.stim.startDate))/86400000)+1)}
function isStimActive(){return state.stim.active}
function nowTime(){const n=new Date();return`${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`}
function fmtSaved(iso){if(!iso)return"noch nie";const d=new Date(iso);return d.toLocaleDateString("de-DE",{day:"numeric",month:"short"})+", "+d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
function setTab(t){state.tab=t;state.feedback=null;render();window.scrollTo(0,0)}

async function toggleSuper(id){
  const k=todayKey();
  if(!state.superChecks[k])state.superChecks[k]={};
  state.superChecks[k][id]=!state.superChecks[k][id];
  render();
  await saveKey('sc',state.superChecks);
}
async function toggleMady(){
  const k=todayKey();state.madyLog[k]=!state.madyLog[k];render();
  await saveKey('ml',state.madyLog);
}
async function toggleStim(){
  state.stim.active=!state.stim.active;
  if(state.stim.active&&!state.stim.startDate)state.stim.startDate=today().toISOString();
  if(!state.stim.active)state.stim.afterTransfer=false;
  render();await saveKey('stim',state.stim);
}
async function setStimDate(t,v){
  if(t==='start')state.stim.startDate=v?new Date(v).toISOString():null;
  else state.stim.etDate=v?new Date(v).toISOString():null;
  await saveKey('stim',state.stim);
}
async function toggleAT(){state.stim.afterTransfer=!state.stim.afterTransfer;render();await saveKey('stim',state.stim)}

function setTTab(t){state.trackerTab=t;state.trackerSelected=null;state.offSelected=null;state.mySelected=null;state.trackerSearch="";render()}
function listSearch(v){state.trackerSearch=v;state.trackerSelected=null;render()}
function mySearch(v){state.mySearch=v;state.mySelected=null;render()}
function setMyMode(m){state.myFoodMode=m;state.newFood={name:"",kcal:"",prot:"",unit:"g",cat:"Eigene"};render()}

function listSel(id){
  state.trackerSelected=BUILTIN_FOODS.find(f=>f.id===id)||null;state.trackerAmount="";render();
  setTimeout(()=>{const el=document.getElementById("list-amt");if(el){el.focus();el.scrollIntoView({behavior:"smooth",block:"center"})}},100);
}
async function addFromList(){
  const sel=state.trackerSelected;if(!sel)return;
  const amt=parseFloat(document.getElementById("list-amt")?.value);
  if(!amt||amt<=0){alert("Bitte Menge eingeben");return}
  const f=sel.u==="Stück"?amt:(amt/100);
  addLog({name:sel.n,kcal:Math.round(sel.kcal*f),prot:Math.round(sel.p*f*10)/10,amount:amt,unit:sel.u,src:"list"});
  state.trackerSelected=null;state.trackerAmount="";state.trackerSearch="";render();
}

async function searchOFF(){
  const q=(document.getElementById("off-inp")?.value||state.offSearch).trim();
  if(!q){alert("Bitte Suchbegriff eingeben");return}
  state.offSearch=q;state.offLoading=true;state.offResults=[];state.offSelected=null;render();
  try{
    const url=`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&json=1&lc=de&fields=product_name,nutriments&page_size=20`;
    const data=await(await fetch(url)).json();
    state.offResults=(data.products||[]).filter(p=>p.product_name&&(p.nutriments?.["energy-kcal_100g"]||0)>0).slice(0,15).map(p=>({name:p.product_name,kcal:Math.round(p.nutriments["energy-kcal_100g"]||0),prot:Math.round((p.nutriments["proteins_100g"]||0)*10)/10}));
    if(!state.offResults.length)state.offResults=[{name:"Kein Treffer – anderes Stichwort versuchen",kcal:0,_empty:true}];
  }catch{state.offResults=[{name:"⚠️ Netzwerkfehler – erneut versuchen",kcal:0,_empty:true}]}
  state.offLoading=false;render();
}
function offSel(i){const p=state.offResults[i];if(p._empty)return;state.offSelected={...p,i};state.offAmount="";render();setTimeout(()=>{const el=document.getElementById("off-amt");if(el){el.focus();el.scrollIntoView({behavior:"smooth",block:"center"})}},100)}
async function addFromOFF(){
  const sel=state.offSelected;if(!sel)return;

  if(!amt||amt<=0){alert("Bitte Menge eingeben");return}
  addLog({name:sel.name,kcal:Math.round(sel.kcal*amt/100),prot:Math.round((sel.prot||0)*amt/100*10)/10,amount:amt,unit:"g",src:"off"});
  state.offSelected=null;render();
}
async function saveToMy(){
  const sel=state.offSelected;if(!sel)return;
  state.customFoods.push({id:"my_"+Date.now(),name:sel.name,kcal:sel.kcal,prot:sel.prot||0,unit:"g",cat:"Open Food Facts"});

function mySel(id){state.mySelected=state.customFoods.find(f=>f.id===id)||null;state.myAmount="";render();setTimeout(()=>{const el=document.getElementById("my-amt");if(el){el.focus();el.scrollIntoView({behavior:"smooth",block:"center"})}},100)}
async function addFromMy(){
  const sel=state.mySelected;if(!sel)return;

  if(!amt||amt<=0){alert("Bitte Menge eingeben");return}
  const f=sel.unit==="Stück"?amt:(amt/100);
  addLog({name:sel.name,kcal:Math.round(sel.kcal*f),prot:Math.round((sel.prot||0)*f*10)/10,amount:amt,unit:sel.unit,src:"my"});

}
async function saveNewFood(){
  const name=document.getElementById("nf-name")?.value?.trim();
  const kcal=parseInt(document.getElementById("nf-kcal")?.value);
  const prot=parseFloat(document.getElementById("nf-prot")?.value)||0;

  const cat=document.getElementById("nf-cat")?.value||"Eigene";

}
async function delMyFood(id){
  if(!confirm("Löschen?"))return;
  state.customFoods=state.customFoods.filter(f=>f.id!==id);
  if(state.mySelected?.id===id)state.mySelected=null;
  await saveKey('cf',state.customFoods);render();
}
async function addManual(){
  const name=document.getElementById("man-name")?.value?.trim();
  const kcal=parseInt(document.getElementById("man-kcal")?.value);
  const prot=parseFloat(document.getElementById("man-prot")?.value)||0;
  if(!name||!kcal){alert("Bitte Name und Kalorien eingeben");return}
  addLog({name,kcal,prot,amount:"–",unit:"",src:"manual"});render();
}
async function addLog(entry){
  const key=todayKey();
  if(!state.tracker[key])state.tracker[key]=[];
  state.tracker[key].push({...entry,time:nowTime()});
  state.feedback=null;
  await saveKey('tr',state.tracker);
}
async function delLog(i){
  const key=todayKey();state.tracker[key]=(state.tracker[key]||[]).filter((_,j)=>j!==i);
  state.feedback=null;await saveKey('tr',state.tracker);render();
}

// ─── EXPORT / IMPORT ───────────────────────
function exportData(){
  const payload={
    version:"5.0",exported:new Date().toISOString(),
    cycleDay1:state.cycleDay1?.toISOString()||null,
    superChecks:state.superChecks,
    madyLog:state.madyLog,
    tracker:state.tracker,
    customFoods:state.customFoods,
    stim:state.stim,
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`kiwu-app-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click();URL.revokeObjectURL(url);
}
async function importData(input){
  const file=input.files?.[0];if(!file)return;
  try{
    const text=await file.text();
    const data=JSON.parse(text);
    if(!data.version){alert("Ungültige Datei");return}
    if(!confirm("Alle aktuellen Daten werden überschrieben. Fortfahren?"))return;
    state.cycleDay1=data.cycleDay1?new Date(data.cycleDay1):null;
    state.superChecks=data.superChecks||{};
    state.madyLog=data.madyLog||{};
    state.tracker=data.tracker||{};
    state.customFoods=data.customFoods||[];
    if(data.stim)state.stim={...state.stim,...data.stim};
    await Promise.all([
      saveKey('cd1',state.cycleDay1?.toISOString()||null),
      saveKey('sc',state.superChecks),
      saveKey('ml',state.madyLog),
      saveKey('tr',state.tracker),
      saveKey('cf',state.customFoods),
      saveKey('stim',state.stim),
    ]);
    alert("✅ Import erfolgreich! Alle Daten wurden übertragen.");
    render();
  }catch(e){alert("Fehler beim Import: "+e.message)}
  input.value="";
}

// ─── AI FEEDBACK ───────────────────────────
async function getFeedback(){
  const key=todayKey(),logs=state.tracker[key]||[];
  if(!logs.length){alert("Bitte zuerst Mahlzeiten eintragen!");return}
  state.feedbackLoading=true;state.feedback=null;render();
  const tKcal=logs.reduce((s,l)=>s+l.kcal,0),tProt=logs.reduce((s,l)=>s+(l.prot||0),0);
  const day=cycleDay(),phase=day?getPhase(day).name:"Unbekannt";
  const stim=isStimActive(),sd=stimDay();
  const sc=state.superChecks[key]||{};
  const missing=SUPERFOODS.filter(s=>!sc[s.id]&&!(stim&&s.stimForbid)).map(s=>s.name.replace(/[^\w\säöüÄÖÜ\-]/g,"").trim()).join(", ");
  const mealList=logs.map(l=>`- ${l.name}: ${l.kcal} kcal, ${l.prot||0}g Prot`).join("\n");
  const prompt=`Du bist KiWu-Ernährungsberaterin für Sandra, 42, Essentielle Thrombozythämie (JAK2), Vegetarierin, IVF.
Zyklusphase: ${phase}${stim?`\nSTIMULATIONSPHASE Tag ${sd}!`:""}${stim&&state.stim.afterTransfer?"\nNACH EMBRYOTRANSFER!":""}
Mahlzeiten heute (${tKcal} kcal, ${tProt}g Prot):
${mealList}
Tagesziel: 1.600–1.800 kcal, mind. 65g Prot
Fehlende Superfoods: ${missing||"keine"}
${stim?"Maca VERBOTEN!":""}
Antworte NUR als JSON (keine Backticks):
{"bewertung":"super|gut|ok|verbesserbar","kcal_status":"zu wenig|optimal|zu viel","protein_status":"ausreichend|zu wenig","lob":"ein Satz","phasen_tipps":["T1","T2"],"verbesserungen":["V1","V2"],"warnungen":[],"superfood_tipp":"..."}`;
  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    const data=await resp.json();
    const txt=data.content?.find(c=>c.type==="text")?.text||"{}";
    state.feedback=JSON.parse(txt.replace(/```json|```/g,"").trim());
  }catch{state.feedback={error:"Analyse nicht verfügbar – erneut versuchen."}}
  state.feedbackLoading=false;render();
}

// ─── MAIN RENDER ───────────────────────────
function render(){
  const day=cycleDay(),phase=day?getPhase(day):null,stim=isStimActive(),sd=stimDay();
  const tabs=[{id:"heute",e:"🏠",l:"Heute"},{id:"tracker",e:"🍽",l:"Tracker"},{id:"plan",e:"📋",l:"Plan"},{id:"ivf",e:"💉",l:"IVF"},{id:"kiwu",e:"⭐",l:"KiWu"}];

  if(state.tab==="heute")content=renderHeute();
  else if(state.tab==="tracker")content=renderTracker();

  else if(state.tab==="ivf")content=renderIVF();
  else if(state.tab==="kiwu")content=renderKiWu();

  document.getElementById("app").innerHTML=`
    ${state.recipe?renderRecipeModal(state.recipe):""}
    ${!state.cycleDay1?`<div class="overlay"><div class="sheet" onclick="event.stopPropagation()" style="max-height:55vh">

        <button class="btn pri full" onclick="setupDay1()">Zyklus starten 🌸</button>
      </div><div style="height:20px"></div>
    </div></div>`:""}

      <div class="ht">🌸 Meine KiWu-App</div>
      <div class="hd">${formatDate(today())}</div>
      <div class="hchips">
        ${day&&phase?`<div class="chip"><div class="chip-l">Zyklustag</div><div class="chip-v">${day}</div></div><div class="chip"><div class="chip-l">Phase</div><div class="chip-v sm">${phase.emoji} ${phase.name}</div></div>`:""}
        ${stim?`<div class="chip"><div class="chip-l">Stimulation</div><div class="chip-v sm">💉 Tag ${sd}</div></div>`:""}
      </div>
      <div class="sync-badge">${storageType()} · gespeichert: ${fmtSaved(state.lastSaved)}</div>
    </div></div>
    <div class="nav">${tabs.map(t=>`<button class="nb ${state.tab===t.id?"active":""} ${t.id==="ivf"&&stim?"stim-active":""}" onclick="setTab('${t.id}')"><span class="ic">${t.e}</span><span>${t.l}</span></button>`).join("")}</div>

}

async function setupDay1(){
  const v=document.getElementById("setup-date")?.value;if(!v)return;

}
