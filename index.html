<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🌸 KiWu-App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--rose:#8B4A6B;--rose-light:#D4A8C0;--rose-bg:#FDF0F5;--green:#66BB6A;--text:#2D1B0E;--text-soft:#9A7D7D;--bg:#FDF8F4;--orange:#E65100;--stim:#C62828;--blue:#1F5FA6}
body{font-family:Georgia,serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.hdr{background:linear-gradient(135deg,#8B4A6B,#C4797A,#E8A87C);padding:calc(env(safe-area-inset-top,16px)+16px) 16px 50px;position:relative;overflow:hidden}
.hdr.stim-mode{background:linear-gradient(135deg,#B71C1C,#E53935,#EF6C00)}
.hdr::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:rgba(255,255,255,0.08);border-radius:50%}
.hi{position:relative;z-index:1}
.ht{font-size:23px;font-weight:bold;color:#fff}
.hd{color:rgba(255,255,255,0.85);font-size:12px;margin-top:2px}
.hchips{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.chip{background:rgba(255,255,255,0.25);border-radius:12px;padding:7px 12px;backdrop-filter:blur(10px)}
.chip-l{color:rgba(255,255,255,0.8);font-size:10px}
.chip-v{color:#fff;font-size:15px;font-weight:bold}
.chip-v.sm{font-size:11px}
.sync-badge{background:rgba(255,255,255,0.2);border-radius:8px;padding:4px 10px;font-size:10px;color:#fff;display:inline-flex;align-items:center;gap:4px;margin-top:6px}
.nav{display:flex;background:#fff;border-radius:20px 20px 0 0;margin:-20px 12px 0;box-shadow:0 -4px 20px rgba(0,0,0,0.08);overflow:hidden;position:relative;z-index:10}
.nb{flex:1;padding:9px 1px 7px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;border-bottom:2px solid transparent;color:var(--text-soft);font-size:8.5px;font-family:inherit;transition:all 0.2s}
.nb.active{background:var(--rose-bg);color:var(--rose);border-bottom-color:var(--rose)}
.nb.stim-active{background:#FFF5F5!important;color:var(--stim)!important;border-bottom-color:var(--stim)!important}
.nb .ic{font-size:16px}
.content{padding-bottom:calc(env(safe-area-inset-bottom,20px)+80px)}
.card{background:#fff;border-radius:16px;padding:16px;margin:10px 12px 0;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.ct{font-size:12px;font-weight:bold;color:var(--rose);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ct.stim{color:var(--stim)}
.chkrow{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;margin-bottom:6px;cursor:pointer;border:1px solid;transition:all 0.2s}
.chkrow.done{background:#F0FFF4;border-color:#A5D6A7}
.chkrow.todo{background:var(--bg);border-color:#F0E8ED}
.chkrow.forbidden{background:#FFF5F5;border-color:#FFCDD2;cursor:default}
.cc{width:24px;height:24px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;flex-shrink:0}
.cc.done{background:var(--green);border-color:var(--green)}
.cc.todo{background:transparent;border-color:var(--rose-light)}
.cc.warn{background:#FFB300;border-color:#FFB300}
.sprow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #F5EEF8}
.stag{padding:2px 8px;border-radius:8px;font-size:11px;font-weight:bold}
.stag.yes{background:#E8F5E9;color:#2E7D32}
.stag.light{background:#FFF8E1;color:var(--orange)}
.stag.no{background:#FEEBEB;color:#C62828}
.inp{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid #E8D5E0;font-size:14px;background:#fff;color:var(--text);font-family:inherit}
.inp:focus{outline:none;border-color:var(--rose)}
.lbl{font-size:11px;color:var(--text-soft);margin-bottom:4px}
.btn{border:none;border-radius:12px;padding:10px 18px;font-size:13px;font-weight:bold;cursor:pointer;font-family:inherit;transition:all 0.15s}
.btn.pri{background:var(--rose);color:#fff}
.btn.ok{background:var(--green);color:#fff}
.btn.stim{background:var(--stim);color:#fff}
.btn.gray{background:#F0E8ED;color:var(--rose)}
.btn.full{width:100%}
.btn.sm{padding:6px 12px;font-size:11px}
.btn:active{transform:scale(0.97)}
.info-row{padding:5px 0;font-size:12px;color:#6B4E71;line-height:1.9}
.step-r{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid #F5EEF8;align-items:flex-start}
.circle{width:28px;height:28px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;flex-shrink:0}
.warn-box{background:#FFF3E0;border-left:4px solid #FF8F00;border-radius:0 10px 10px 0;padding:8px 12px;font-size:12px;color:#5D4037;margin:6px 0;line-height:1.7}
.spinner{display:flex;justify-content:center;padding:20px;align-items:center;gap:10px;font-size:13px;color:var(--text-soft)}
.spin{width:28px;height:28px;border:3px solid var(--rose-bg);border-top-color:var(--rose);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.init-screen{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;color:var(--rose);background:var(--bg)}
.init-icon{font-size:48px;animation:pulse 1.5s ease-in-out infinite}
.init-text{font-size:14px;color:var(--text-soft)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1);opacity:0.7}}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
.toggle{position:relative;width:48px;height:26px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.tslider{position:absolute;inset:0;background:#ccc;border-radius:13px;transition:0.3s}
.tslider:before{content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:0.3s}
input:checked+.tslider{background:var(--rose)}
input:checked+.tslider.stim-t{background:var(--stim)}
input:checked+.tslider:before{transform:translateX(22px)}
.sync-card{background:linear-gradient(135deg,#E8F5E9,#F0FFF4);border:1.5px solid #A5D6A7;border-radius:14px;padding:14px;margin-bottom:10px}
.sync-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:12px;border-bottom:1px solid rgba(0,0,0,0.06)}
.sync-key{color:#4A4A4A}
.sync-val{color:#2E7D32;font-weight:bold;font-size:11px}
/* SPORT */
.sport-btn{border:none;border-radius:14px;padding:10px 8px;cursor:pointer;font-family:inherit;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:0}
.sport-btn.idle{background:#F5EEF8;color:var(--rose)}
.sport-btn.done{background:#E8F5E9;color:#2E7D32}
.sport-btn .sb-icon{font-size:20px}
.sport-btn .sb-label{font-size:9px;font-weight:bold;text-align:center;line-height:1.3}
.sport-log-entry{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:linear-gradient(135deg,#F0FFF4,#E8F5E9);border-radius:10px;margin-bottom:6px;border:1px solid #A5D6A7}
.sport-log-del{background:none;border:none;color:#D9534F;cursor:pointer;font-size:18px;padding:0 4px;flex-shrink:0}
.dur-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:bold;cursor:pointer;border:1.5px solid #E8D5E0;background:#fff;color:var(--rose);font-family:inherit;transition:all 0.15s}
.dur-chip.sel{background:var(--rose);color:#fff;border-color:var(--rose)}
.int-btn{flex:1;padding:8px 4px;border-radius:10px;border:1.5px solid #E8D5E0;background:#fff;cursor:pointer;font-family:inherit;font-size:11px;font-weight:bold;color:var(--text-soft);transition:all 0.15s;text-align:center}
.int-btn.sel-leicht{background:#E8F5E9;border-color:#66BB6A;color:#2E7D32}
.int-btn.sel-mittel{background:#FFF8E1;border-color:#FFB300;color:#E65100}
.int-btn.sel-intensiv{background:#FFEBEE;border-color:#EF5350;color:#C62828}
.wb-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.wb-bar{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height 0.3s}
.wb-label{font-size:9px;color:var(--text-soft)}
/* ERNÄHRUNG */
.phase-tab{flex:1;padding:8px 4px;border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-size:10px;font-weight:bold;transition:all 0.2s;text-align:center}
.kiwu-tip{background:linear-gradient(135deg,#FDF0F5,#F8F4FF);border-left:4px solid var(--rose);border-radius:0 12px 12px 0;padding:10px 12px;margin:6px 0;font-size:12px;color:#6B4E71;line-height:1.7}

/* CHAT */
.chat-bubble{max-width:85%;padding:10px 14px;border-radius:18px;font-size:13px;line-height:1.6;margin-bottom:8px;word-break:break-word}
.chat-bubble.user{background:var(--rose);color:#fff;border-bottom-right-radius:4px;align-self:flex-end;margin-left:auto}
.chat-bubble.claude{background:#fff;color:var(--text);border-bottom-left-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,0.08);align-self:flex-start}
.chat-bubble.claude.loading{color:var(--text-soft);font-style:italic}
.chat-wrap{display:flex;flex-direction:column;min-height:200px;max-height:55vh;overflow-y:auto;padding:8px 0;gap:4px}
.chat-input-row{display:flex;gap:8px;margin-top:10px;align-items:flex-end}
.chat-inp{flex:1;padding:10px 14px;border-radius:20px;border:1.5px solid #E8D5E0;font-size:14px;background:#fff;color:var(--text);font-family:inherit;resize:none;max-height:100px}
.chat-inp:focus{outline:none;border-color:var(--rose)}
.chat-send{width:42px;height:42px;border-radius:50%;background:var(--rose);border:none;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.chat-send:disabled{background:var(--rose-light)}
</style>
</head>

async function storeGet(k){const key='kiwu_'+k;if(typeof window.storage!=='undefined'){try{const r=await window.storage.get(key);return r?JSON.parse(r.value):null}catch{}}try{return JSON.parse(localStorage.getItem(key))}catch{return null}}
async function storeSet(k,v){const key='kiwu_'+k;const str=JSON.stringify(v);if(typeof window.storage!=='undefined'){try{await window.storage.set(key,str)}catch{}}try{localStorage.setItem(key,str)}catch{}}
function storageType(){return typeof window.storage!=='undefined'?'☁️ Cloud-Sync aktiv':'💾 Lokaler Speicher'}

async function getWeekAnalysis(){
  state.weekAnalysisLoading=true;state.weekAnalysis=null;render();

  const ws=getWeekStats();
  const totalMins=ws.reduce((s,d)=>s+d.mins,0);
  const activeDays=ws.filter(d=>d.mins>0).length;
  // Collect all entries for last 7 days
  const entries=[];
  for(let i=6;i>=0;i--){
    const d=new Date(today());d.setDate(d.getDate()-i);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const logs=state.sportLog[k]||[];
    if(logs.length>0){
      const label=["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];
      logs.forEach(l=>entries.push(`${label}: ${l.label} ${l.duration}Min (${l.intensity})`));

  }
  const sportList=entries.length>0?entries.join(", "):"Kein Sport diese Woche";
  const prompt=`Du bist KiWu-Trainingsberaterin für Sandra, 42, Essentielle Thrombozythämie (JAK2), Vegetarierin, IVF.
Aktuelle Zyklusphase: ${phaseName} (Zyklustag ${day||"??"})
Sport letzte 7 Tage (${activeDays} aktive Tage, ${totalMins} Minuten gesamt):
${sportList}
Bewerte die Sportwoche kurz und gib 2-3 konkrete Empfehlungen für die nächste Woche passend zur Zyklusphase.
Antworte NUR als JSON (keine Backticks):
{"bewertung":"super|gut|ok|wenig","lob":"ein motivierender Satz","analyse":"2-3 Sätze zur Woche","naechste_woche":["Tipp 1","Tipp 2","Tipp 3"],"phase_tipp":"1 Satz Sport-Tipp für aktuelle Phase"}`;
  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,messages:[{role:"user",content:prompt}]})});

    state.weekAnalysis=JSON.parse(txt.replace(/```json|```/g,"").trim());

function exportData(){
  const p={version:"7.0",exported:new Date().toISOString(),cycleDay1:state.cycleDay1?.toISOString()||null,superChecks:state.superChecks,madyLog:state.madyLog,stim:state.stim,sportLog:state.sportLog};

async function importData(input){
  const file=input.files?.[0];if(!file)return;
  try{
    const data=JSON.parse(await file.text());if(!data.version){alert("Ungültige Datei");return}
    if(!confirm("Alle Daten überschreiben?"))return;
    state.cycleDay1=data.cycleDay1?new Date(data.cycleDay1):null;
    state.superChecks=data.superChecks||{};state.madyLog=data.madyLog||{};state.sportLog=data.sportLog||{};
    if(data.stim)state.stim={...state.stim,...data.stim};
    await Promise.all([saveKey('cd1',state.cycleDay1?.toISOString()||null),saveKey('sc',state.superChecks),saveKey('ml',state.madyLog),saveKey('stim',state.stim),saveKey('sl',state.sportLog)]);
    alert("✅ Import erfolgreich!");render();
  }catch(e){alert("Fehler: "+e.message)}input.value="";
}

async function sendChat(){
  const input=document.getElementById("chat-input");
  const msg=(input?.value||state.chatInput).trim();
  if(!msg||state.chatLoading)return;
  state.chatMessages.push({role:"user",content:msg});
  state.chatInput="";state.chatLoading=true;render();
  setTimeout(()=>{const el=document.getElementById("chat-wrap");if(el)el.scrollTop=el.scrollHeight},50);
  try{
    const messages=state.chatMessages.map(m=>({role:m.role,content:m.content}));
    const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,system:buildChatContext(),messages})});
    const data=await resp.json();
    const reply=data.content?.find(c=>c.type==="text")?.text||"Entschuldigung, ich konnte nicht antworten.";
    state.chatMessages.push({role:"assistant",content:reply});
  }catch{state.chatMessages.push({role:"assistant",content:"⚠️ Verbindungsfehler – bitte erneut versuchen."})}
  state.chatLoading=false;render();
  setTimeout(()=>{const el=document.getElementById("chat-wrap");if(el)el.scrollTop=el.scrollHeight},50);
}

  let content="";
  if(state.tab==="heute")content=renderHeute();
  else if(state.tab==="zyklus")content=renderZyklus();
  else if(state.tab==="ernaehrung")content=renderErnaehrung();
  else if(state.tab==="ivf")content=renderIVF();
  else if(state.tab==="chat")content=renderChat();
  else if(state.tab==="kiwu")content=renderKiWu();
  document.getElementById("app").innerHTML=`
    ${!state.cycleDay1?`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;display:flex;align-items:flex-end"><div style="background:#fff;border-radius:24px 24px 0 0;width:100%;padding:24px 20px 44px">
      <div style="font-size:20px;font-weight:bold;color:var(--rose);margin-bottom:8px">🌸 Willkommen!</div>
      <div style="font-size:13px;color:var(--text-soft);margin-bottom:16px">Wann war dein erster Zyklustag?</div>
      <div class="lbl">1. Zyklustag</div>
      <input type="date" id="setup-date" class="inp" style="margin-bottom:14px" value="${today().toISOString().split('T')[0]}" max="${today().toISOString().split('T')[0]}">
      <button class="btn pri full" onclick="setupDay1()">Zyklus starten 🌸</button>
    </div></div>`:""}
    <div class="hdr ${stim?"stim-mode":""}"><div class="hi">
      <div class="ht">🌸 Meine KiWu-App</div>
      <div class="hd">${formatDate(today())}</div>
      <div class="hchips">
        ${day&&phase?`<div class="chip"><div class="chip-l">Zyklustag</div><div class="chip-v">${day}</div></div><div class="chip"><div class="chip-l">Phase</div><div class="chip-v sm">${phase.emoji} ${phase.name}</div></div>`:""}
        ${stim?`<div class="chip"><div class="chip-l">Stimulation</div><div class="chip-v sm">💉 Tag ${sd}</div></div>`:""}
        ${getTodaySportLogs().length>0?`<div class="chip"><div class="chip-l">Sport</div><div class="chip-v sm">🏃 ${getTodaySportLogs().reduce((s,l)=>s+l.duration,0)} Min</div></div>`:""}
      </div>
      <div class="sync-badge">${storageType()} · ${fmtSaved(state.lastSaved)}</div>
    </div></div>
    <div class="nav">${tabs.map(t=>`<button class="nb ${state.tab===t.id?"active":""} ${t.id==="ivf"&&stim?"stim-active":""}" onclick="setTab('${t.id}')"><span class="ic">${t.e}</span><span>${t.l}</span></button>`).join("")}</div>
    <div class="content">${content}</div>`;
}

async function setupDay1(){const v=document.getElementById("setup-date")?.value;if(!v)return;state.cycleDay1=new Date(v);await saveKey('cd1',state.cycleDay1.toISOString());render()}
(async()=>{await loadState();render();})();
</script>
</body>
</html>
