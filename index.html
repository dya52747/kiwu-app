*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--rose:#8B4A6B;--rose-light:#D4A8C0;--rose-bg:#FDF0F5;--green:#66BB6A;--text:#2D1B0E;--text-soft:#9A7D7D;--bg:#FDF8F4;--orange:#E65100;--stim:#C62828;--blue:#1F5FA6}
body{font-family:Georgia,serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.hdr{background:linear-gradient(135deg,#8B4A6B,#C4797A,#E8A87C);padding:calc(env(safe-area-inset-top,16px)+16px) 16px 50px;position:relative;overflow:hidden}
.hdr.stim-mode{background:linear-gradient(135deg,#B71C1C,#E53935,#EF6C00)}
.hdr::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:rgba(255,255,255,0.08);border-radius:50%}
.hi{position:relative;z-index:1}
.ht{font-size:23px;font-weight:bold;color:#fff}
.hd{color:rgba(255,255,255,0.85);font-size:12px;margin-top:2px}
.hchips{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.chip{background:rgba(255,255,255,0.25);border-radius:12px;padding:7px 12px;backdrop-filter:blur(10px)}
.chip-l{color:rgba(255,255,255,0.8);font-size:10px}
.chip-v{color:#fff;font-size:15px;font-weight:bold}
.chip-v.sm{font-size:11px}
.sync-badge{background:rgba(255,255,255,0.2);border-radius:8px;padding:4px 10px;font-size:10px;color:#fff;display:inline-flex;align-items:center;gap:4px;margin-top:6px}
.nav{display:flex;background:#fff;border-radius:20px 20px 0 0;margin:-20px 12px 0;box-shadow:0 -4px 20px rgba(0,0,0,0.08);overflow:hidden;position:relative;z-index:10}
.nb{flex:1;padding:9px 1px 7px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;border-bottom:2px solid transparent;color:var(--text-soft);font-size:8.5px;font-family:inherit;transition:all 0.2s}
.nb.active{background:var(--rose-bg);color:var(--rose);border-bottom-color:var(--rose)}
.nb.stim-active{background:#FFF5F5!important;color:var(--stim)!important;border-bottom-color:var(--stim)!important}
.nb .ic{font-size:16px}
.content{padding-bottom:calc(env(safe-area-inset-bottom,20px)+80px)}
.card{background:#fff;border-radius:16px;padding:16px;margin:10px 12px 0;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.ct{font-size:12px;font-weight:bold;color:var(--rose);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ct.stim{color:var(--stim)}
.chkrow{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;margin-bottom:6px;cursor:pointer;border:1px solid;transition:all 0.2s}
.chkrow.done{background:#F0FFF4;border-color:#A5D6A7}
.chkrow.todo{background:var(--bg);border-color:#F0E8ED}
.chkrow.forbidden{background:#FFF5F5;border-color:#FFCDD2;cursor:default}
.cc{width:24px;height:24px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;flex-shrink:0}
.cc.done{background:var(--green);border-color:var(--green)}
.cc.todo{background:transparent;border-color:var(--rose-light)}
.cc.warn{background:#FFB300;border-color:#FFB300}
.sprow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #F5EEF8}
.stag{padding:2px 8px;border-radius:8px;font-size:11px;font-weight:bold}
.stag.yes{background:#E8F5E9;color:#2E7D32}
.stag.light{background:#FFF8E1;color:var(--orange)}
.stag.no{background:#FEEBEB;color:#C62828}
.inp{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid #E8D5E0;font-size:14px;background:#fff;color:var(--text);font-family:inherit}
.inp:focus{outline:none;border-color:var(--rose)}
.lbl{font-size:11px;color:var(--text-soft);margin-bottom:4px}
.btn{border:none;border-radius:12px;padding:10px 18px;font-size:13px;font-weight:bold;cursor:pointer;font-family:inherit;transition:all 0.15s}
.btn.pri{background:var(--rose);color:#fff}
.btn.ok{background:var(--green);color:#fff}
.btn.stim{background:var(--stim);color:#fff}
.btn.gray{background:#F0E8ED;color:var(--rose)}
.btn.full{width:100%}
.btn.sm{padding:6px 12px;font-size:11px}
.btn:active{transform:scale(0.97)}
.info-row{padding:5px 0;font-size:12px;color:#6B4E71;line-height:1.9}
.step-r{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid #F5EEF8;align-items:flex-start}
.circle{width:28px;height:28px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;flex-shrink:0}
.warn-box{background:#FFF3E0;border-left:4px solid #FF8F00;border-radius:0 10px 10px 0;padding:8px 12px;font-size:12px;color:#5D4037;margin:6px 0;line-height:1.7}
.spinner{display:flex;justify-content:center;padding:20px;align-items:center;gap:10px;font-size:13px;color:var(--text-soft)}
.spin{width:28px;height:28px;border:3px solid var(--rose-bg);border-top-color:var(--rose);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.init-screen{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;color:var(--rose);background:var(--bg)}
.init-icon{font-size:48px;animation:pulse 1.5s ease-in-out infinite}
.init-text{font-size:14px;color:var(--text-soft)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1);opacity:0.7}}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
.toggle{position:relative;width:48px;height:26px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.tslider{position:absolute;inset:0;background:#ccc;border-radius:13px;transition:0.3s}
.tslider:before{content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:0.3s}
input:checked+.tslider{background:var(--rose)}
input:checked+.tslider.stim-t{background:var(--stim)}
input:checked+.tslider:before{transform:translateX(22px)}
.sync-card{background:linear-gradient(135deg,#E8F5E9,#F0FFF4);border:1.5px solid #A5D6A7;border-radius:14px;padding:14px;margin-bottom:10px}

.sync-key{color:#4A4A4A}
.sync-val{color:#2E7D32;font-weight:bold;font-size:11px}

async function storeGet(k){const key='kiwu_'+k;if(typeof window.storage!=='undefined'){try{const r=await window.storage.get(key);return r?JSON.parse(r.value):null}catch{}}try{return JSON.parse(localStorage.getItem(key))}catch{return null}}
async function storeSet(k,v){const key='kiwu_'+k;const str=JSON.stringify(v);if(typeof window.storage!=='undefined'){try{await window.storage.set(key,str)}catch{}}try{localStorage.setItem(key,str)}catch{}}
function storageType(){return typeof window.storage!=='undefined'?'☁️ Cloud-Sync aktiv':'💾 Lokaler Speicher'}

  {name:"Menstruation",color:"#E57373",bg:"#FFF5F5",emoji:"🔴",days:"Tag 1–5",desc:"Ruhe & Regeneration",tip:"Eisen + Vitamin C kombinieren für maximale Aufnahme."},

];
function getPhaseIdx(d){if(d<=5)return 0;if(d<=13)return 1;if(d<=16)return 2;return 3}

// Smart phase: uses confirmed ovulation date if available
function getSmartPhase(){
  const day=cycleDay();
  if(!day)return null;
  const latestOv=typeof getLatestOvulation==="function"?getLatestOvulation():null;
  if(latestOv){
    // Ovulation confirmed – calculate phase from ovulation date
    const ovDate=new Date(latestOv+"T12:00");
    const todayD=today();
    todayD.setHours(12,0,0,0);
    const daysSinceOv=Math.floor((todayD-ovDate)/86400000);
    if(daysSinceOv<0){
      // Still before confirmed ovulation → Aufbauphase
      return{...PHASES[1],idx:1,smart:true};
    } else if(daysSinceOv===0){
      // Day of ovulation
      return{...PHASES[2],idx:2,smart:true};
    } else {
      // After ovulation → Lutealphase
      return{...PHASES[3],idx:3,smart:true,daysSinceOv};
    }
  } else {
    // No ovulation confirmed yet
    if(day<=5)return{...PHASES[0],idx:0};
    // Stay in Aufbauphase until ovulation confirmed
    if(day>16){
      return{...PHASES[1],idx:1,smart:true,note:"⏳ Warte auf Eisprung-Bestätigung"};
    }
    return{...PHASES[getPhaseIdx(day)],idx:getPhaseIdx(day)};
  }
}

function getPhase(d){return{...PHASES[getPhaseIdx(d)],idx:getPhaseIdx(d)}}

function getDPO(){
  const ov=getLatestOvulation();
  if(!ov)return null;
  const ovDate=new Date(ov+"T12:00");
  const todayD=today();todayD.setHours(12,0,0,0);
  return Math.floor((todayD-ovDate)/86400000);
}

function getSmartSport(){
  const dpo=getDPO();
  if(dpo===null)return null;
  if(dpo<0)return null; // Before confirmed ovulation
  const key=Math.min(dpo,14);
  return SPORT_DPO[key]||SPORT_DPO[14];
}

async function loadState(){
  try{

    state.superChecks=sc||{};state.madyLog=ml||{};
    state.bleedingDays=bd||{};state.sportLog=sl||{};
    state.ovulationDays=ov||{};state.lutealLength=ll||14;
    state.cycles=cy||[];
    // Migrate from old single cycleDay1
    if(state.cycles.length===0&&cd1){
      const startStr=new Date(cd1).toISOString().split('T')[0];
      state.cycles=[{id:"cycle_1",startDate:startStr,endDate:null,ovulationDate:null,ovulationDay:null,length:null}];
      await saveKey('cy',state.cycles);
    }

    if(stim)state.stim={...state.stim,...stim};
    state.lastSaved=ls||null;const n=today();state.calMonth={year:n.getFullYear(),month:n.getMonth()};

// ─── OVULATION HELPERS ─────────────────────
function getLatestOvulation(){
  const keys=Object.keys(state.ovulationDays).filter(k=>state.ovulationDays[k]).sort();
  return keys.length>0?keys[keys.length-1]:null;
}
function getPredictedPeriod(){
  const ov=getLatestOvulation();
  if(!ov)return null;
  const d=new Date(ov+"T12:00");
  d.setDate(d.getDate()+state.lutealLength);
  return d;
}
function getPredictedNextOvulation(){
  const pp=getPredictedPeriod();
  if(!pp)return null;
  const d=new Date(pp);
  // Estimate ovulation ~14 days after predicted period
  if(state.cycleDay1){
    const cycleLen=Math.round((new Date(getLatestOvulation()+"T12:00")-state.cycleDay1)/86400000)+1;
    d.setDate(d.getDate()+cycleLen-state.lutealLength);
  } else {
    d.setDate(d.getDate()+14);
  }
  return d;
}
function fmtDate(d){return d.toLocaleDateString("de-DE",{day:"numeric",month:"short"})}

async function toggleOvulation(dateStr){
  state.ovulationDays[dateStr]=!state.ovulationDays[dateStr];

  await saveKey('ov',state.ovulationDays);
  render();
}

// ─── CYCLE MANAGEMENT ──────────────────────
function currentCycle(){return state.cycles.find(c=>!c.endDate)||null}

function allCycles(){return [...state.cycles].reverse()} // newest first

function cycleLength(c){
  if(!c.endDate)return null;
  const s=new Date(c.startDate+"T12:00");
  const e=new Date(c.endDate+"T12:00");
  return Math.round((e-s)/86400000)+1;
}

async function startNewCycle(){
  const todayStr=todayKey();
  // Close current cycle
  const cur=currentCycle();
  if(cur){
    const yesterday=new Date(today());
    yesterday.setDate(yesterday.getDate()-1);
    cur.endDate=yesterday.toISOString().split('T')[0];
    cur.length=cycleLength(cur);
    // Check if ovulation was in this cycle
    const ovInCycle=Object.keys(state.ovulationDays)
      .filter(k=>state.ovulationDays[k]&&k>=cur.startDate&&k<=cur.endDate)
      .sort().pop();
    if(ovInCycle){
      cur.ovulationDate=ovInCycle;
      const start=new Date(cur.startDate+"T12:00");
      const ov=new Date(ovInCycle+"T12:00");
      cur.ovulationDay=Math.round((ov-start)/86400000)+1;
      cur.lutealLength=cur.length-cur.ovulationDay;
    }
  }
  // Create new cycle
  const newId="cycle_"+(state.cycles.length+1);
  const newCycle={id:newId,startDate:todayStr,endDate:null,ovulationDate:null,ovulationDay:null,length:null,lutealLength:state.lutealLength};
  state.cycles.push(newCycle);
  state.cycleDay1=new Date(todayStr);
  state.newCycleMode=false;
  await saveKey('cy',state.cycles);
  await saveKey('cd1',state.cycleDay1.toISOString());
  render();
}

  const daysInMonth=new Date(year,month+1,0).getDate();
  const startDow=(new Date(year,month,1).getDay()+6)%7;
  const todayD=today();const isThisMonth=todayD.getFullYear()===year&&todayD.getMonth()===month;
  const mSportDays=Object.keys(state.sportLog).filter(k=>{const d=new Date(k);return d.getFullYear()===year&&d.getMonth()===month&&(state.sportLog[k]||[]).length>0}).length;
  const mSportMins=Object.keys(state.sportLog).filter(k=>{const d=new Date(k);return d.getFullYear()===year&&d.getMonth()===month}).reduce((s,k)=>s+(state.sportLog[k]||[]).reduce((a,l)=>a+(l.duration||0),0),0);
  function cdBg(d){
    if(!state.cycleDay1)return"#F5EEF8";
    const diff=Math.floor((new Date(year,month,d)-state.cycleDay1)/86400000);
    const cd=diff>=0?diff+1:null;
    if(!cd||cd<1)return"#F5EEF8";
    if(cd<=5)return"#FFCDD2"; // Menstruation
    // Check if ovulation confirmed on or before this date
    const cellDate=new Date(year,month,d);
    cellDate.setHours(12,0,0,0);
    const ovKeys=Object.keys(state.ovulationDays).filter(k=>state.ovulationDays[k]).sort();
    const confirmedOvBefore=ovKeys.some(k=>{const od=new Date(k+"T12:00");return od<=cellDate;});
    if(confirmedOvBefore){
      // Find the ovulation date closest before this cell
      const ovDate=new Date(ovKeys.filter(k=>new Date(k+"T12:00")<=cellDate).pop()+"T12:00");
      const daysSinceOv=Math.floor((cellDate-ovDate)/86400000);
      if(daysSinceOv===0)return"#C8E6C9"; // Ovulation day
      return"#E1BEE7"; // Luteal
    }
    // No confirmed ovulation yet for this date - stay Aufbau after day 5
    return"#BBDEFB";

  function hasSport(d){return(state.sportLog[dKey(d)]||[]).length>0}

  function isPredPeriod(d){if(!predPer)return false;const pd=new Date(year,month,d);return pd.toDateString()===predPer.toDateString()}
  function isPredOv(d){if(!predNxOv)return false;const pd=new Date(year,month,d);return pd.toDateString()===predNxOv.toDateString()}
  let cells=[];for(let i=0;i<startDow;i++)cells.push(null);for(let d=1;d<=daysInMonth;d++)cells.push(d);
  const entries=[];
  for(let i=0;i<14;i++){const d=new Date(today());d.setDate(d.getDate()-i);const k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");const logs=state.sportLog[k]||[];if(logs.length>0)entries.push({date:d,logs})}
  // Compute superfood days (>=5 done)
  let sfDays=0;
  for(let d=1;d<=daysInMonth;d++){const sc=state.superChecks[dKey(d)]||{};if(Object.values(sc).filter(Boolean).length>=5)sfDays++;}
  // Build calendar cells HTML

function calNav(dir){let{year,month}=state.calMonth;month+=dir;if(month<0){month=11;year--;}if(month>11){month=0;year++;}state.calMonth={year,month};render()}
async function setNewDay1(){const v=document.getElementById("new-day1")?.value;if(!v)return;state.cycleDay1=new Date(v);await saveKey('cd1',state.cycleDay1.toISOString());render()}
function setTab(t){state.tab=t;state.sportAddMode=false;render();window.scrollTo(0,0)}
function setErnaehrungPhase(i){state.ernaehrungPhase=i;render()}
async function toggleSuper(id){const k=getSFDateKey();if(!state.superChecks[k])state.superChecks[k]={};state.superChecks[k][id]=!state.superChecks[k][id];render();await saveKey('sc',state.superChecks)}
async function toggleMady(){const k=todayKey();state.madyLog[k]=!state.madyLog[k];render();await saveKey('ml',state.madyLog)}
async function toggleStim(){state.stim.active=!state.stim.active;if(state.stim.active&&!state.stim.startDate)state.stim.startDate=today().toISOString();if(!state.stim.active)state.stim.afterTransfer=false;render();await saveKey('stim',state.stim)}
async function setStimDate(t,v){if(t==='start')state.stim.startDate=v?new Date(v).toISOString():null;else state.stim.etDate=v?new Date(v).toISOString():null;await saveKey('stim',state.stim)}
async function toggleAT(){state.stim.afterTransfer=!state.stim.afterTransfer;render();await saveKey('stim',state.stim)}

function exportData(){
  const p={version:"8.0",exported:new Date().toISOString(),cycleDay1:state.cycleDay1?.toISOString()||null,superChecks:state.superChecks,madyLog:state.madyLog,stim:state.stim,sportLog:state.sportLog,ovulationDays:state.ovulationDays,lutealLength:state.lutealLength,cycles:state.cycles};
  const blob=new Blob([JSON.stringify(p,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`kiwu-backup-${new Date().toISOString().split('T')[0]}.json`;a.click();URL.revokeObjectURL(url);
}
async function importData(input){
  const file=input.files?.[0];if(!file)return;
  try{
    const data=JSON.parse(await file.text());if(!data.version){alert("Ungültige Datei");return}
    if(!confirm("Alle Daten überschreiben?"))return;
    state.cycleDay1=data.cycleDay1?new Date(data.cycleDay1):null;
    state.superChecks=data.superChecks||{};state.madyLog=data.madyLog||{};state.sportLog=data.sportLog||{};
    if(data.stim)state.stim={...state.stim,...data.stim};
    state.cycles=data.cycles||[];await Promise.all([saveKey('cd1',state.cycleDay1?.toISOString()||null),saveKey('sc',state.superChecks),saveKey('ml',state.madyLog),saveKey('stim',state.stim),saveKey('sl',state.sportLog),saveKey('ov',state.ovulationDays),saveKey('ll',state.lutealLength),saveKey('cy',state.cycles)]);
    alert("✅ Import erfolgreich!");render();
  }catch(e){alert("Fehler: "+e.message)}input.value="";
}

  if(state.tab==="heute")content=renderHeute();

  else if(state.tab==="kiwu")content=renderKiWu();

    </div></div>`:""}

      <div class="ht">🌸 Meine KiWu-App</div>
      <div class="hd">${formatDate(today())}</div>
      <div class="hchips">
        ${day?`<div class="chip"><div class="chip-l">Zyklustag</div><div class="chip-v">${day}</div></div>`:""}
        ${phase?`<div class="chip"><div class="chip-l">Phase</div><div class="chip-v sm">${phase.emoji} ${phase.name}</div></div>`:""}
        ${stim?`<div class="chip"><div class="chip-l">Stimulation</div><div class="chip-v sm">💉 Tag ${sd}</div></div>`:""}

      </div>
      <div class="sync-badge">${storageType()} · ${fmtSaved(state.lastSaved)}</div>
    </div></div>
    <div class="nav">${tabs.map(t=>`<button class="nb ${state.tab===t.id?"active":""} ${t.id==="ivf"&&stim?"stim-active":""}" onclick="setTab('${t.id}')"><span class="ic">${t.e}</span><span>${t.l}</span></button>`).join("")}</div>
    <div class="content">${content}</div>`;
}

(async()=>{await loadState();render();})();
</script>
